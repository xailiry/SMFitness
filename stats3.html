    <!-- Theme Toggle Script -->
    <script>
        const toggle = document.getElementById('theme-toggle');
        toggle.addEventListener('click', () => {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                html.classList.add('light');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.remove('light');
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
    <!-- Custom Confirm Modal -->
    <div id="confirm-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-dark-900/40 backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-dark-800 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 w-full max-w-sm p-6 transform scale-95 transition-transform duration-300">
            <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-2" id="confirm-modal-title">Подтвердите действие</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-6" id="confirm-modal-text">Вы уверены?</p>
            <div class="flex justify-end gap-3">
                <button id="confirm-modal-cancel" class="px-5 py-2.5 rounded-xl text-sm font-medium text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-dark-700 hover:bg-gray-200 dark:hover:bg-dark-600 transition">Отмена</button>
                <button id="confirm-modal-ok" class="px-5 py-2.5 rounded-xl text-sm font-medium text-white bg-red-500 hover:bg-red-600 transition shadow-[0_4px_14px_0_rgba(239,68,68,0.39)]">Подтвердить</button>
            </div>
        </div>
    </div>
    <script>
        function showConfirmModal(title, text, onConfirm) {
            const modal = document.getElementById('confirm-modal');
            const modalBox = modal.querySelector('div');
            document.getElementById('confirm-modal-title').innerText = title;
            document.getElementById('confirm-modal-text').innerText = text;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            // Trigger reflow
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            modalBox.classList.remove('scale-95');

            const btnCancel = document.getElementById('confirm-modal-cancel');
            const btnOk = document.getElementById('confirm-modal-ok');
            
            const closeModal = () => {
                modal.classList.add('opacity-0');
                modalBox.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                }, 300);
            };

            btnCancel.onclick = closeModal;
            btnOk.onclick = () => {
                closeModal();
                onConfirm();
            };
        }
    </script>
